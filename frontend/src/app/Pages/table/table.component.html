<div class="seccionBoton">
    <button [appBasicButton]="colorPrimary">Crear</button>
</div>
<div class="seccionTabla">
    <table>
        <thead>
            <tr>
                <th style="width: 10%">ID</th>
                <th>Marca</th>
                <th>Modelo</th>
                <th style="width: 15%">Total</th>
                <th style="width: 10%">Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
                <td style="text-align: center">
                    <button
                        class="botonAcciones"
                        [appBasicButton]="colorSecondary"
                        [cdkMenuTriggerFor]="menu"
                    >
                        Acciones
                    </button>
                </td>
            </tr>
        </tbody>
    </table>
</div>
<ng-template #menu>
    <div class="example-menu" cdkMenu>
        <button
            cdkMenuItemCheckbox
            class="example-menu-item"
            [cdkMenuItemChecked]="bold"
            (cdkMenuItemTriggered)="bold = !bold"
        >
            Bold
        </button>
        <button
            cdkMenuItemCheckbox
            class="example-menu-item"
            [cdkMenuItemChecked]="italic"
            (cdkMenuItemTriggered)="italic = !italic"
        >
            Italic
        </button>
    </div>
</ng-template>
