<!-- breadcrumb.component.html -->

<nav aria-label="breadcrumb">
    <ul class="breadcrumb">
        @for (
            breadcrumb of breadcrumbs;
            track breadcrumb.url;
            let last = $last
        ) {
            <li>
                @if (!last) {
                    <a [routerLink]="breadcrumb.url">{{ breadcrumb.label }}</a
                    >/
                } @else {
                    <strong>{{ breadcrumb.label }}</strong>
                }
            </li>
        }
    </ul>
</nav>
